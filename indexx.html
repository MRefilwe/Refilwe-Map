<!DOCTYPE html>
<html>

<head>

  <title>Test Map</title>

  <meta charset="utf-8" />

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>

    body {
      margin: 0;
      padding: 0;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

  </style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // CREATE MAP
  const map = L.map('map').setView([-29.8587, 31.0218], 10);

  // LOAD MAP TILES
  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution: '&copy; OpenStreetMap contributors'
    }
  ).addTo(map);

  // TEST MARKER
  L.marker([-29.8587, 31.0218])

    .addTo(map)

    .bindPopup("Durban")

    .openPopup();

</script>

</body>

</html>
