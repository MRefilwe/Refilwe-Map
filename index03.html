<!DOCTYPE html>
<html>

<head>

  <title>Live Task Map</title>

  <meta charset="utf-8" />

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>

    body {
      margin: 0;
      padding: 0;
    }

    #map {
      height: 100px;
      width: 100%;
    }

  </style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // CREATE MAP
  const map = L.map('map').setView([-26.0, 28.0], 10);

  // MAP TILES
  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution: '&copy; OpenStreetMap contributors'
    }
  ).addTo(map);

  // LOCATIONS
  const locations = [

    fetch('locations.json')

  .then(response => response.json())

  .then(locations => {

    locations.forEach(location => {

      L.marker([location.lat, location.lng])

        .addTo(map)

        .bindPopup(
          `
          <h2>${location.title}</h2>

          <p><b>Task:</b> ${location.task}</p>

          <p><b>Technician:</b> ${location.technician}</p>

          <p><b>Status:</b> ${location.status}</p>
          `
        );

    });

  });

  ];

  // ADD MARKERS
  const vehicleIcon = L.icon({

  iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',

  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

  iconSize: [25, 41],

  iconAnchor: [12, 41],

  popupAnchor: [1, -34],

  shadowSize: [41, 41]

});

});

});
  locations.forEach(location => {

    L.marker([location.lat, location.lng],
	    icon: vehicleIcon)

      .addTo(map)

      .bindPopup(
        `
        <h2>${location.title}</h2>

        <p><b>Task:</b> ${location.task}</p>

        <p><b>Technician:</b> ${location.technician}</p>

        <p><b>Status:</b> ${location.status}</p>
        `
      );

  });

  // ROUTE/TRAIL
  const route = [

    [-25.8602437, 28.1898451],

    [-26.0015321, 27.8407124],

    [-26.0937125, 27.9826231]

  ];

  // DRAW ROUTE
  L.polyline(route, {
    color: 'blue',
    weight: 4
  }).addTo(map);

</script>

</body>

</html>
